# Garden Irrigation — Configuration
# Copy to config.yaml and fill in your values.
# config.yaml is gitignored — never commit secrets.

broker:
  host: localhost
  port: 1883

web:
  host: "0.0.0.0"
  port: 8000
  public_url: "https://garten-bewaesserung.joancode.dev"

auth:
  jwt_secret: "change-me-to-a-random-string"
  admin_username: "admin"
  admin_password: "change-me"

discord:
  bot_token: "your-discord-bot-token"
  webhook_url: "https://discord.com/api/webhooks/..."
  alert_user_id: "your-discord-user-id"

pins:
  1: "Gartenschlauch unten rechts"
  2: "Bewässerungsschlauch oben"
  3: "Hauptwasserversorgung"
  4: "Sprinkler Beet oben"
  5: "frei"
  6: "frei"
  7: "frei"

database:
  path: "garden.db"
